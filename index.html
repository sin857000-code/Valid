<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roguelike Dungeon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 { font-size: 2.4rem; color: #a78bfa; margin-bottom: 0.5rem; }
    p  { color: #888; margin-bottom: 2rem; font-size: 1rem; }
    .badge {
      background: #1e1e2e;
      border: 1px solid #7c3aed;
      border-radius: 12px;
      padding: 1.5rem 2.5rem;
      text-align: center;
      max-width: 480px;
    }
    .badge ul {
      list-style: none;
      text-align: left;
      margin: 1rem 0;
      line-height: 2;
      color: #ccc;
    }
    .badge ul li::before { content: "▸ "; color: #a78bfa; }
    .note {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Roguelike Dungeon</h1>
  <p>Godot 4 포트폴리오 프로젝트</p>
  <div class="badge">
    <strong>구현 기능</strong>
    <ul>
      <li>BSP 알고리즘 절차적 맵 생성</li>
      <li>적 3종 + 보스 (페이즈 2 시스템)</li>
      <li>경험치 & 레벨업</li>
      <li>무기 3종 (단검 / 롱소드 / 마법 지팡이)</li>
      <li>아이템 시스템 (포션, 공격력 업)</li>
      <li>미니맵 실시간 표시</li>
      <li>세이브 / 로드 (자동 저장)</li>
    </ul>
    <p style="color:#888; font-size:0.9rem;">WebGL 빌드 준비 중입니다.<br>Godot 에디터에서 프로젝트를 열어 직접 플레이하세요.</p>
  </div>
  <p class="note">소스코드: github.com/sin857000-code/Valid</p>
</body>
</html>
